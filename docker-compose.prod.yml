version: "3.8"

services:
  database:
    image: postgres:16-alpine
    container_name: vote-rutherford-db-prod
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-username}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-default_database}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-username} -d ${POSTGRES_DB:-default_database}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vote-rutherford-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vote-rutherford-app-prod
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-username}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-default_database}?schema=public
      - HOST=0.0.0.0
      - PORT=4321
    depends_on:
      database:
        condition: service_healthy
    networks:
      - vote-rutherford-network
    command: sh -c "npx prisma migrate deploy && node ./dist/server/entry.mjs"

networks:
  vote-rutherford-network:
    driver: bridge

volumes:
  postgres_data:

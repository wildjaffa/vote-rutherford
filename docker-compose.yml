services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vote-rutherford-app
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:./prisma/dev.db

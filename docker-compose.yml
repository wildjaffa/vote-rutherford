services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PUBLIC_FIREBASE_CLIENT_ACCOUNT_KEY=${PUBLIC_FIREBASE_CLIENT_ACCOUNT_KEY}
    container_name: vote-rutherford-app
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:./prisma/dev.db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    # volumes:
    # Mount source code for hot-reload
    # - ./src:/app/src
    # - ./public:/app/public
    # - ./prisma:/app/prisma
    # - ./astro.config.mjs:/app/astro.config.mjs
    # - ./tsconfig.json:/app/tsconfig.json
    # - ./package.json:/app/package.json
    # # Prevent overwriting node_modules
    # - /app/node_modules

  redis:
    image: redis:7-alpine
    container_name: vote-rutherford-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
